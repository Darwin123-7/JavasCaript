    <script>
        function add7 (a) {
            debugger;   
            return alert(a + 7);

        function multiply (x, y) {
            return alert ( x * y);
        }

            function capitalize (a) {
                a = a.charAt(0).toUpperCase() + a.slice(1).toLowerCase();
                return alert(a);
                
            }

            function capitalized(ad) {
                ad = ad.toLowerCase();
                return alert(ad);
            }

            function capitalizedd(a) {
                a = a.charAt(0).toUpperCase() + a.slice(1).toLowerCase();
                return alert(a);

            }

            function lastLetter(a) {
               a = a.charAt(3);
                return alert(a);

            }
            add7(10);
            multiply(3, 2);
            capitalize("abcd");
            capitalized("ABCD");
            capitalizedd("aBcD");
            lastLetter("abcd");


    </script>
